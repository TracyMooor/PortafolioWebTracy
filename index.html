<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracy Moriano — Creative Engineer</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-color: #050505;
      --text-color: #f5f5f5;
    }

    body {
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    h4,
    .heading {
      font-family: 'Syne', sans-serif;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    html {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    /* Utility & Animation Classes */
    .ease-expo {
      transition-timing-function: cubic-bezier(0.87, 0, 0.13, 1);
    }

    .perspective-1000 {
      perspective: 1000px;
    }

    .vertical-rl {
      writing-mode: vertical-rl;
    }

    @keyframes spine-scroll {
      0% {
        transform: translateY(-100%);
      }

      100% {
        transform: translateY(100%);
      }
    }

    .animate-spine-scroll {
      animation: spine-scroll 2.5s cubic-bezier(0.7, 0, 0.3, 1) infinite;
    }

    @keyframes pulse-custom {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .animate-pulse-custom {
      animation: pulse-custom 2s infinite;
    }

    .noise-bg-texture {
      background-image: url('https://grainy-gradients.vercel.app/noise.svg');
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <div class="noise-overlay"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
